# Jekyll 설정 파일
#
# 이 파일은 사이트 전체에 적용되는 전역 설정을 모아둔 곳입니다.
# 자주 바뀌지 않는 값들을 여기에 넣고, 글/페이지별 값은 Front Matter에서 따로 지정합니다.
# 참고: `jekyll serve` 실행 중에는 이 파일이 자동으로 다시 로드되지 않으므로,
# 값을 바꾼 뒤에는 개발 서버를 재시작해야 합니다.

# 테마 설정
#
# `theme` 또는 `remote_theme` 중 하나만 사용합니다.
# 설치 방식에 맞는 값을 활성화하세요.
# 문서: https://mmistakes.github.io/minimal-mistakes/docs/quick-start-guide/#installing-the-theme
#
# 예시 1) gem 방식
# theme                  : "minimal-mistakes-jekyll"
#
# 예시 2) GitHub Pages + remote_theme 방식
# remote_theme           : "mmistakes/minimal-mistakes"

# theme                  : "minimal-mistakes-jekyll"
# remote_theme           : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "aqua" # 사이트 스킨. 사용 가능: "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise", "catppuccin_latte", "catppuccin_mocha"

# 사이트 기본 정보
#
# 예시:
# locale                 : "ko-KR"
# title                  : "우수의 개발 노트"
# subtitle               : "개발, 실험, 메모"
# name                   : "wusu"
# description            : "프론트엔드와 개발 메모를 정리하는 개인 사이트"
# url                    : "https://wusu7.github.io"
# baseurl                : ""          # 사용자 페이지면 보통 비움
# baseurl                : "/blog"     # 프로젝트 페이지면 보통 저장소 이름
locale                   : "en-US" # 사이트 기본 언어/로캘. 한국어 사이트라면 "ko-KR" 권장
rtl                      : # 오른쪽에서 왼쪽으로 읽는 언어용. 한국어/영어 사이트는 보통 비움 또는 false
title                    : "Site Title" # 사이트 기본 제목
title_separator          : "-" # HTML title에서 제목 사이를 구분하는 문자
subtitle                 : # 상단 masthead 아래에 표시할 부제
name                     : "Your Name" # 사이트 운영자/작성자 이름
description              : "An amazing website." # SEO용 설명 문구
url                      : "https://wusu7.github.io" # 최종 배포 주소. 로컬 주소(http://localhost)는 넣지 않음
baseurl                  : # 사이트가 서브 경로에 배포될 때 사용. 예: "/blog"
repository               : # GitHub 저장소. 예: "wusu7/wusu7.github.io"
teaser                   : # 기본 티저 이미지 경로. 예: "/assets/images/500x300.png"
logo                     : # 상단 로고 이미지 경로. 예: "/assets/images/logo.png"
masthead_title           : # 상단에 표시할 제목을 별도로 지정. 제목을 숨기려면 " " 사용
breadcrumbs              : # true, false (기본값 false) # 글/페이지 상단 경로 표시 여부
words_per_minute         : 200 # 읽기 시간 계산용 분당 단어 수
enable_copy_code_button  : # true, false (기본값 false) # 코드 블록 복사 버튼 표시
copyright                : # 저작권 표시에 쓸 이름. 비우면 site.title 사용
copyright_url            : # 저작권 이름에 연결할 URL. 비우면 site.url 사용

# 댓글 설정
#
# provider 선택지:
# false (기본값), "disqus", "discourse", "facebook", "staticman",
# "staticman_v2", "utterances", "giscus", "custom"
#
# 예시 1) Giscus
# comments:
#   provider: "giscus"
#   giscus:
#     repo_id: "R_kgDOExample"
#     category_name: "Announcements"
#     category_id: "DIC_kwDOExample4C..."
#     discussion_term: "pathname"
#     reactions_enabled: '1'
#     theme: "light"
#
# 예시 2) Disqus
# comments:
#   provider: "disqus"
#   disqus:
#     shortname: "my-blog-shortname"
comments:
  provider               : # 사용할 댓글 시스템
  disqus:
    shortname            : # Disqus shortname. 안내: https://help.disqus.com/customer/portal/articles/466208-what-s-a-shortname-
  discourse:
    server               : # Discourse 서버 주소. 예: meta.discourse.org
  facebook:
    # 문서: https://developers.facebook.com/docs/plugins/comments
    appid                :
    num_posts            : # 기본 5개
    colorscheme          : # "light" (기본값), "dark"
  utterances:
    theme                : # "github-light" (기본값), "github-dark"
    issue_term           : # "pathname" (기본값)
  giscus:
    repo_id              : # https://giscus.app 설정 과정에서 표시되는 값
    category_name        : # 카테고리의 전체 이름
    category_id          : # https://giscus.app 설정 과정에서 표시되는 값
    discussion_term      : # "pathname" (기본값), "url", "title", "og:title"
    reactions_enabled    : # '1' 활성화 (기본값), '0' 비활성화
    theme                : # "light" (기본값), "dark", "dark_dimmed", "transparent_dark", "preferred_color_scheme"
    strict               : # 1 활성화, 0 비활성화 (기본값)
    input_position       : # "top", "bottom" # 입력창 위치
    emit_metadata        : # 1 활성화, 0 비활성화 (기본값) # https://github.com/giscus/giscus/blob/main/ADVANCED-USAGE.md#imetadatamessage
    lang                 : # 댓글 UI 언어. 예: "ko", "en"
    lazy                 : # true, false # 댓글 영역 근처로 스크롤될 때까지 로딩 지연
  staticman:
    branch               : # 예: "master" 또는 "main"
    endpoint             : # 예: "https://{your Staticman v3 API}/v3/entry/github/"

# reCAPTCHA 설정
# 댓글 폼 스팸 방지가 필요할 때 사용합니다.
reCaptcha:
  siteKey                :
  secret                 :

# Atom/RSS 피드 설정
atom_feed:
  path                   : # 비우면 기본값 feed.xml 사용
  hide                   : # true, false (기본값 false) # 피드 링크 숨김 여부

# 검색 설정
#
# 예시:
# search                 : true
# search_provider        : "lunr"
search                   : # true, false (기본값 false)
search_full_content      : # true, false (기본값 false) # 검색 인덱스에 본문 전체 포함 여부
search_provider          : # "lunr" (기본값), "algolia", "google"
lunr:
  search_within_pages    : # true, false (기본값) # 일반 페이지도 검색 대상에 포함
algolia:
  application_id         : # YOUR_APPLICATION_ID
  index_name             : # YOUR_INDEX_NAME
  search_only_api_key    : # YOUR_SEARCH_ONLY_API_KEY
  powered_by             : # true (기본값), false
google:
  search_engine_id       : # YOUR_SEARCH_ENGINE_ID
  instant_search         : # false (기본값), true

# SEO 관련 인증 코드
# 각 검색엔진 웹마스터 도구에서 발급받은 값을 넣습니다.
google_site_verification :
bing_site_verification   :
naver_site_verification  :
yandex_site_verification :
baidu_site_verification  :

# 소셜 공유 메타데이터
twitter:
  username               : # 예: "your_id" (앞의 @ 없이)
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : # Open Graph/Twitter 기본 대표 이미지
og_image_alt             : # 대표 이미지 대체 텍스트

# 구조화 데이터용 소셜 프로필
# 참고: https://developers.google.com/structured-data/customize/social-profiles
social:
  type                   : # Person 또는 Organization (기본값 Person)
  name                   : # 사이트 이름과 다를 때만 별도로 지정
  links: # 소셜 프로필 URL 배열
    # 예시:
    # - "https://github.com/wusu7"
    # - "https://twitter.com/your_id"

# 방문자 분석 도구 설정
#
# 예시:
# analytics:
#   provider: "google-gtag"
#   google:
#     tracking_id: "G-XXXXXXXXXX"
#     anonymize_ip: true
analytics:
  provider               : # false (기본값), "google", "google-universal", "google-gtag", "custom"
  google:
    tracking_id          :
    anonymize_ip         : # true, false (기본값)


# 작성자 정보
#
# 이 값들은 작성자 프로필, 메타 태그, 사이드바 등에 사용됩니다.
# 예시:
# author:
#   name: "wusu"
#   avatar: "/assets/images/bio-photo.jpg"
#   bio: "프론트엔드와 AI 관련 기록을 남깁니다."
#   location: "Seoul, Korea"
#   email: "hello@example.com"
author:
  name             : "Your Name"
  avatar           : # 프로필 이미지 경로. 예: "/assets/images/bio-photo.jpg"
  bio              : "I am an **amazing** person."
  location         : "Somewhere"
  email            :
  # fediverse      : "@you@instance.social"  # fediverse:creator 메타 태그에 사용
  links:
    # 예시:
    # - label: "GitHub"
    #   icon: "fab fa-fw fa-github"
    #   url: "https://github.com/your-id"
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      # url: "mailto:your.name@email.com" # 예: "mailto:hello@example.com"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      # url: "https://your-website.com"
    - label: "Twitter"
      icon: "fab fa-fw fa-square-x-twitter"
      # url: "https://twitter.com/"
    - label: "Facebook"
      icon: "fab fa-fw fa-square-facebook"
      # url: "https://facebook.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      # url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      # url: "https://instagram.com/"

# 사이트 하단 푸터 링크
#
# 예시:
# footer:
#   links:
#     - label: "GitHub"
#       icon: "fab fa-fw fa-github"
#       url: "https://github.com/wusu7"
#   since: "2024"
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-square-x-twitter"
      # url:
      # rel: "me"  # 선택 사항: IndieWeb 웹 사인인 등에 사용
    - label: "Facebook"
      icon: "fab fa-fw fa-square-facebook"
      # url:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      # url:
    - label: "GitLab"
      icon: "fab fa-fw fa-gitlab"
      # url:
    - label: "Bitbucket"
      icon: "fab fa-fw fa-bitbucket"
      # url:
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      # url:
  since: "2013" # 푸터 연도 범위의 시작 연도


# 읽을 파일 / 제외할 파일
# Jekyll 빌드 대상과 제외 대상을 설정합니다.
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs # Minimal Mistakes 기본 문서 폴더는 빌드에서 제외
  - /test # Minimal Mistakes 기본 테스트 폴더는 빌드에서 제외
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md" # 마크다운 파일로 인식할 확장자 목록


# 변환 관련 설정
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n" # 요약문 분리 기준. 글에서 이 구분자 앞부분이 excerpt가 됨
incremental: false


# Markdown 처리 설정
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS 설정
sass:
  sass_dir: _sass
  style: compressed # 출력 스타일. 압축본으로 생성


# 출력 URL 설정
#
# 예시:
# permalink: /:categories/:title/
# permalink: /:title/
permalink: /:categories/:title/
timezone: # 예: "Asia/Seoul" # 날짜/시간 표시용 타임존


# jekyll-paginate 페이지네이션
paginate: 5 # 홈 목록 등에 한 페이지당 표시할 글 수
paginate_path: /page:num/

# jekyll-paginate-v2 페이지네이션
# 문서: https://github.com/sverrirs/jekyll-paginate-v2/blob/master/README-GENERATOR.md#site-configuration
pagination:
  # enabled를 true로 바꾸면 paginate v2를 사용합니다.
  # enabled: true
  debug: false
  collection: 'posts'
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  category: 'posts'
  tag: ''
  locale: ''
  trail:
    before: 2
    after: 2


# 플러그인 목록
# GitHub Pages 호환을 위해 필요한 플러그인만 유지하는 편이 안전합니다.
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# GitHub Pages의 --safe 환경을 흉내 내는 허용 목록
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# 아카이브 설정
# type:
# - liquid           : GitHub Pages 호환 방식 (기본값)
# - jekyll-archives  : jekyll-archives 플러그인 방식
#
# path 예시:
# - /tags/
# - /categories/
# - /
#
# 참고:
# breadcrumb를 켠 경우, 아카이브 페이지가 실제로 존재하는 경로와 path가 맞지 않으면
# 링크가 깨질 수 있습니다.
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# show_taxonomy: false  # 글 하단 태그/카테고리 목록을 숨기고 싶을 때 사용
#
# jekyll-archives 사용 예시
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/


# HTML 압축 설정
# 참고: https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development # 개발 환경에서는 압축하지 않음


# 기본 Front Matter 설정
# 별도 지정이 없을 때 자동으로 적용될 기본값입니다.
#
# 예시:
# - 모든 post에 single 레이아웃, 공유 버튼, 관련 글 표시를 기본 적용
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: # true
      share: true
      related: true
